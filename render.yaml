services:
  - type: web
    name: payment-system-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN.vercel.app
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: JWT_SECRET_KEY
        generateValue: true
      # Set DATABASE_URL in the Render dashboard when you attach Postgres.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: payment-system-postgres
      #     property: connectionString

databases:
  - name: payment-system-postgres
    plan: free
    region: oregon

